<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能主观题答题卡</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            min-height: 100vh;
            background-color: #f5f5f5;
        }

        /* 左侧控制面板 */
        .control-panel {
            width: 300px;
            background-color: white;
            padding: 20px;
            box-shadow: 2px 0 5px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            gap: 20px;
            max-height: 100vh;        /* 👈 限制高度 */
            overflow-y: auto;         /* 👈 独立滚动 */
        }

        .control-group h3 {
            margin-bottom: 10px;
            font-size: 16px;
            color: #333;
        }

        .control-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
            color: #555;
        }

        .control-group input[type="text"],
        .control-group input[type="number"] {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        .question-item {
            margin-bottom: 15px;
            padding: 10px;
            background-color: #f9f9f9;
            border-radius: 4px;
            position: relative;
        }

        .question-item > label {
            display: block;
            margin-bottom: 5px;
        }

        .word-count-input-group {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .word-count-input-group input {
            flex: 1;
            width: auto;
        }

        .adjust-btn {
            width: auto;
            height: 28px;
            padding: 0;
            font-size: 14px;
            background: #f1f1f1;
            border: 1px solid #ccc;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .adjust-btn:first-child {
            border-radius: 4px 0 0 4px;
        }

        .adjust-btn:last-child {
            border-left: none;
            border-radius: 0 4px 4px 0;
        }

        .adjust-btn:hover {
            background: #e0e0e0;
        }

        .question-item button.remove-btn {
            background-color: #e74c3c;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            position: absolute;
            top: 5px;
            right: 20px;
        }

        .question-item button.remove-btn:hover {
            background-color: #c0392b;
        }

        .add-question-btn {
            background-color: #3498db;
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 10px;
        }

        .add-question-btn:hover {
            background-color: #2980b9;
        }

        /* 右侧预览区 */
        .preview-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 20px;
            overflow-y: auto;         /* 👈 独立滚动 */
            max-height: 100vh;
        }

        .card-container {
            width: 210mm; /* A4 宽度 */
            min-height: 297mm; /* A4 高度 */
            background-color: white;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            padding: 20px;
            position: relative;
        }

        .header-info {
            font-size: 30px;
            margin-bottom: 20px;
            text-align: center;
            border: 1px dashed #030303;
            color: #fc3dac;
            padding: 10px;
        }

        .question-title {
            font-size: 14px;
            margin-bottom: 8px;
            padding-left: 5px;
            font-weight: bold;
        }

        .writing-area {
            display: grid;
            grid-template-columns: repeat(25, 7.928mm);
            grid-auto-rows: 7.928mm;
            column-gap: 0;
            row-gap: 1.321mm;
            width: calc(25 * 7.928mm); /* 198.2mm */
            overflow: visible;
        }

        .cell {
            width: 7.928mm;
            height: 7.928mm;
            border: 1px solid #fc3dac;
            position: relative;
            background-color: white;
            overflow: visible;
        }

        .cell-label {
            position: absolute;
            bottom: -7px;
            left: 0;
            width: 100%;
            text-align: center;
            font-size: 6px;
            color: #000000;
            line-height: 1;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="control-panel">
        <h2>答题卡设置</h2> 
        
        <div class="control-group">
            <label for="headerText">答题卡标题：</label>
            <input 
                type="text" 
                id="headerText" 
                value="综应答题卡"
                oninput="updateCard()"
            >
        </div>

        <div class="control-group">
            <h3>题目列表</h3>
            <div id="questionsContainer">
                <!-- 题目项将动态添加到这里 -->
            </div>
            <button class="add-question-btn" onclick="addQuestion()">+ 添加题目</button>
        </div>

        <button onclick="downloadPDF()" style="padding:12px; font-size:16px;">下载PDF</button>
    </div>

    <div class="preview-container">
        <div id="cardToPrint" class="card-container">
            <div class="header-info">
                <span>综应答题卡</span>
            </div>
            <div id="writingAreaContainer">
                <!-- 每个题目的写作区域将动态添加到这里 -->
            </div>
        </div>
    </div>

    <script>
        const jsPDF = window.jspdf.jsPDF;

        // 数字转中文大写（支持1~99）
        function numberToChinese(num) {
            const chinese = ['零', '一', '二', '三', '四', '五', '六', '七', '八', '九', '十'];
            if (num <= 10) return chinese[num];
            if (num < 20) return '十' + (num % 10 === 0 ? '' : chinese[num % 10]);
            if (num < 100) {
                const tens = Math.floor(num / 10);
                const ones = num % 10;
                return chinese[tens] + '十' + (ones === 0 ? '' : chinese[ones]);
            }
            return `第${num}题`;
        }

        document.addEventListener('DOMContentLoaded', function() {
            addQuestion();
        });

        function addQuestion() {
            const container = document.getElementById('questionsContainer');
            
            const questionItem = document.createElement('div');
            questionItem.className = 'question-item';
            
            // 动态获取当前题号（从1开始）
            const index = container.children.length + 1;
            const chineseIndex = numberToChinese(index);

            // 创建 label（带中文序号）
            const label = document.createElement('label');
            label.textContent = `${chineseIndex}、字数要求：`;

            // 输入框
            const input = document.createElement('input');
            input.type = 'number';
            input.name = 'wordCount';
            input.min = '1';
            input.max = '1000';
            input.value = '100';
            input.style.width = '100%';
            input.onchange = updateCard;

            // 微调按钮组
            const adjustGroup = document.createElement('div');
            adjustGroup.className = 'word-count-input-group';

            const minusBtn = document.createElement('button');
            minusBtn.className = 'adjust-btn';
            minusBtn.textContent = '−25字';
            minusBtn.onclick = () => {
                let val = parseInt(input.value) || 100;
                input.value = Math.max(1, val - 25);
                updateCard();
            };

            const plusBtn = document.createElement('button');
            plusBtn.className = 'adjust-btn';
            plusBtn.textContent = '+50字';
            plusBtn.onclick = () => {
                let val = parseInt(input.value) || 100;
                input.value = Math.min(1000, val + 50);
                updateCard();
            };

            adjustGroup.appendChild(input);
            adjustGroup.appendChild(minusBtn);
            adjustGroup.appendChild(plusBtn);

            // 删除按钮
            const removeBtn = document.createElement('button');
            removeBtn.className = 'remove-btn';
            removeBtn.textContent = '删除题目';
            removeBtn.onclick = () => {
                questionItem.remove();
                updateCard(); // 删除后重新编号
            };

            // 组装
            questionItem.appendChild(label);
            questionItem.appendChild(adjustGroup);
            questionItem.appendChild(removeBtn);

            container.appendChild(questionItem);
            updateCard();
        }

        function updateCard() {
            // 更新标题
            const headerInput = document.getElementById('headerText');
            const headerSpan = document.querySelector('#cardToPrint .header-info span');
            if (headerSpan) {
                headerSpan.textContent = headerInput.value.trim() || '答题卡';
            }

            const writingAreaContainer = document.getElementById('writingAreaContainer');
            writingAreaContainer.innerHTML = '';

            const questions = document.querySelectorAll('#questionsContainer .question-item');

            questions.forEach((question, index) => {
                const wordCountInput = question.querySelector('input[name="wordCount"]');
                const wordCount = parseInt(wordCountInput.value) || 1;
                const rowsNeeded = Math.ceil(wordCount / 25);

                const titleDiv = document.createElement('div');
                titleDiv.className = 'question-title';
                const chineseIndex = numberToChinese(index + 1);
                titleDiv.textContent = `${chineseIndex}、${wordCount}字`;
                writingAreaContainer.appendChild(titleDiv);

                // 外层容器：使用 inline-block，保留右侧 padding
                const writingBlock = document.createElement('div');
                writingBlock.style.display = 'inline-block';
                writingBlock.style.border = '1px solid #000';
                writingBlock.style.paddingTop = '1.321mm';
                writingBlock.style.paddingBottom = '1.321mm';
                writingBlock.style.paddingLeft = '1.321mm';
                writingBlock.style.paddingRight = '1.321mm';
                writingBlock.style.marginBottom = '20px';
                writingBlock.style.boxSizing = 'border-box';

                const writingArea = document.createElement('div');
                writingArea.className = 'writing-area';

                for (let row = 0; row < rowsNeeded; row++) {
                    for (let col = 0; col < 25; col++) {
                        const cell = document.createElement('div');
                        cell.className = 'cell';

                        // 字数提示：第2、4、6...行（row=1,3,5...）显示 50,100,150...
                        if (col === 24 && row % 2 === 1) {
                            const label = document.createElement('div');
                            label.className = 'cell-label';
                            label.textContent = (row + 1) * 25;
                            cell.appendChild(label);
                        }

                        writingArea.appendChild(cell);
                    }
                }

                writingBlock.appendChild(writingArea);
                writingAreaContainer.appendChild(writingBlock);
            });
        }

        async function downloadPDF() {
            const element = document.getElementById('cardToPrint');

            try {
                const canvas = await html2canvas(element, {
                    scale: 4,
                    useCORS: true,
                    logging: false,
                    backgroundColor: '#ffffff'
                });
                const imgData = canvas.toDataURL('image/png', 1.0);

                const pdf = new jsPDF({
                    orientation: 'portrait',
                    unit: 'mm',
                    format: 'a4'
                });

                const imgWidth = 210;
                const imgHeight = (canvas.height * imgWidth) / canvas.width;

                if (imgHeight <= 297) {
                    pdf.addImage(imgData, 'PNG', 0, 0, imgWidth, imgHeight, undefined, 'FAST');
                } else {
                    let position = 0;
                    let pageHeight = 297;
                    let heightLeft = imgHeight;

                    pdf.addImage(imgData, 'PNG', 0, position, imgWidth, imgHeight, undefined, 'FAST');
                    heightLeft -= pageHeight;

                    while (heightLeft > 0) {
                        pdf.addPage();
                        position = -pageHeight * (pdf.internal.getNumberOfPages());
                        pdf.addImage(imgData, 'PNG', 0, position, imgWidth, imgHeight, undefined, 'FAST');
                        heightLeft -= pageHeight;
                    }
                }

                pdf.save('intelligent_writing_card.pdf');
            } catch (error) {
                console.error("生成PDF时出错:", error);
                alert("下载失败，请重试。");
            }
        }
    </script>

</body>
</html>
